spring.application.name=ESPE-Plus

spring.datasource.driver-class-name=org.postgresql.Driver
spring.profiles.active=dev

# Configuración de Conexión Local Nativa (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/espe_plus_db
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.servlet.springcontext-path=/api/v1


server.port=8080


langchain4j.open-ai.chat-model.api-key=demo
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini

# Niveles de Log para desarrollo
logging.level.org.springframework=DEBUG
logging.level.dev.langchain4j=DEBUG
environment.name=Desarrollo (DEV)